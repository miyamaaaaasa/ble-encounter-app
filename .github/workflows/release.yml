name: Android APK Build

on:
  push:
    branches: [ main, master ]   # push のたびに Artifact へ
    tags:
      - 'v*'                      # タグ push 時は Releases へも
  workflow_dispatch:              # 手動実行も可能

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      # ── Artifact（全 push で保存・30日間保持）────────────────────────────
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── GitHub Release（タグ push 時のみ）────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## すれ違い通信アプリ ${{ github.ref_name }}

            ### インストール方法
            1. `app-release.apk` をダウンロード
            2. Android の「提供元不明のアプリ」を許可
            3. APK をタップしてインストール
